<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — MedManage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fefbf6;
            --primary: #0d766e;
            --primary-hover: #0f9488;
            --accent: #c2410c;
            --text: #1c1917;
            --text-muted: #57534e;
            --border: #e7e5e4;
            --radius: 1rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .card { background: #fff; padding: 2rem; border-radius: var(--radius); box-shadow: 0 4px 24px rgba(13, 118, 110, 0.08); max-width: 380px; width: 100%; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--primary); }
        p { color: var(--text-muted); font-size: 0.9375rem; margin-bottom: 1.5rem; }
        .btn { display: inline-flex; align-items: center; padding: 0.75rem 1.25rem; font-family: inherit; font-weight: 600; border-radius: var(--radius); text-decoration: none; color: var(--primary); border: 2px solid var(--primary); background: transparent; cursor: pointer; margin-top: 0.5rem; }
        .btn:hover { background: rgba(13, 118, 110, 0.08); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Iniciar sesión</h1>
        <p>Página de login en construcción.</p>
        <a href="/" class="btn">Volver al inicio</a>
    </div>
</body>
</html>
